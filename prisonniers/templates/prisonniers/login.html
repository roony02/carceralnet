<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Connexion - CarceralNet</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);

}

.login-box{

width:420px;

background:white;

padding:40px;

border-radius:18px;

box-shadow:0 20px 40px rgba(0,0,0,.35);

text-align:center;

}

.logo{

width:110px;

height:110px;

object-fit:contain;

margin-bottom:15px;

}

h1{

color:#1e3a8a;

margin-bottom:5px;

}

h3{

color:#666;

font-weight:normal;

margin-bottom:30px;

}

.input{

width:100%;

padding:15px;

font-size:16px;

border:1px solid #ccc;

border-radius:10px;

margin-bottom:20px;

outline:none;

transition:.3s;

}

.input:focus{

border-color:#2563eb;

box-shadow:0 0 10px rgba(37,99,235,.4);

}

button{

width:100%;

padding:15px;

font-size:18px;

border:none;

border-radius:10px;

background:#2563eb;

color:white;

cursor:pointer;

transition:.3s;

}

button:hover{

background:#1d4ed8;

}

.footer{

margin-top:25px;

font-size:14px;

color:#777;

}

.erreur{

background:#fee2e2;

color:#b91c1c;

padding:12px;

border-radius:8px;

margin-bottom:20px;

}

</style>

</head>

<body>

<div class="login-box">

{% load static %}

<img
src="{% static 'prisonniers/logo.png' %}"
class="logo"
alt="Logo">

<h1>🚔 CARCERALNET</h1>

<h3>Système de Gestion Pénitentiaire</h3>

{% if messages %}
{% for message in messages %}
<div class="erreur">
{{ message }}
</div>
{% endfor %}
{% endif %}

<form method="POST">

{% csrf_token %}

<input
type="text"
name="username"
class="input"
placeholder="👤 Nom d'utilisateur"
required>

<input
type="password"
name="password"
class="input"
placeholder="🔒 Mot de passe"
required>

<button type="submit">

🔐 Se connecter

</button>

</form>

<div class="footer">

République Démocratique du Congo<br>

© 2026 CarceralNet

</div>

</div>

</body>

</html>
